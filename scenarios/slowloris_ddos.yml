---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT Test Scenario: Slow DDoS — Slowloris
# Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
# MITRE ATT&CK: TA0040 - Impact / T1499.001 - OS Exhaustion Flood
# ─────────────────────────────────────────────────────────────

scenario:
  id: "SCN-004"
  name: "Slowloris HTTP DDoS"
  description: >
    Executes a Slowloris-style Layer-7 DDoS attack that opens many
    partial HTTP connections, exhausting the web server thread pool
    without generating large traffic volumes. Tests IDS ability to
    detect low-and-slow DoS patterns.
  mitre_attack:
    tactic: "TA0040 - Impact"
    technique: "T1499.001 - OS Exhaustion Flood"
  runs: 10

attacker:
  host: "10.0.4.10"
  user: "ubuntu"

targets:
  - host: "10.0.2.11"
    port: 80
    service: http

steps:
  - id: step1
    name: "Slowloris — 100 sockets, 60 seconds"
    tool: python3
    command: >
      python3 /opt/archivirt/attack-scripts/slowloris.py
      10.0.2.11
      --port 80
      --sockets 100
      --duration 60
    description: "Open 100 partial HTTP connections and maintain them for 60s"
    expected_detections:
      snort:    "ARCHIVIRT Slowloris DDoS Partial HTTP"
      suricata: "ARCHIVIRT Slowloris DDoS Connection"
    timeout_sec: 90

  - id: step2
    name: "Slowloris — 200 sockets, 120 seconds (high intensity)"
    tool: python3
    command: >
      python3 /opt/archivirt/attack-scripts/slowloris.py
      10.0.2.11
      --port 80
      --sockets 200
      --duration 120
    description: "High-intensity Slowloris to saturate Apache connection limit"
    expected_detections:
      snort:    "ARCHIVIRT Slowloris DDoS Partial HTTP"
      suricata: "ARCHIVIRT Slowloris DDoS Connection"
    timeout_sec: 150

  - id: step3
    name: "Verify service degradation"
    tool: curl
    command: >
      curl -s -o /dev/null -w "%{http_code} %{time_total}"
      http://10.0.2.11/ --max-time 10
    description: "Verify HTTP response time degradation during attack"
    expected_detections: {}
    timeout_sec: 15

  - id: step4
    name: "Monitor target server connection table"
    tool: bash
    command: >
      ssh ubuntu@10.0.2.11
      "ss -tn state established '( dport = :80 )' | wc -l"
    description: "Count established HTTP connections on target during attack"
    expected_detections: {}
    timeout_sec: 10

metrics:
  collect:
    - alert_count
    - false_positive_rate
    - detection_latency_ms
    - cpu_usage_pct
    - ram_usage_mb
    - http_response_time_ms
    - active_connections
  log_sources:
    snort:    "/var/log/snort/alert_fast.txt"
    suricata: "/var/log/suricata/fast.log"

expected_results:
  detection_rate_min_pct: 65.0
  false_positive_rate_max_pct: 0.5
  latency_max_ms: 250
  note: >
    Slowloris is by design difficult to detect at low socket counts.
    Suricata multithreaded engine outperforms Snort (78.9% vs 65.3%)
    due to better connection-state tracking.
