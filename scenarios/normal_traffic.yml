---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT Test Scenario: Normal Traffic Baseline
# Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
# Purpose: Measure false positive rate under legitimate traffic
# ─────────────────────────────────────────────────────────────

scenario:
  id: "SCN-005"
  name: "Normal Traffic Baseline"
  description: >
    Generates legitimate network traffic to measure the IDS false
    positive rate. Simulates typical corporate user activity:
    web browsing, file downloads, SSH login, SCP file transfer.
    No attack intent — this is the control scenario.
  mitre_attack: null
  runs: 10

attacker:
  host: "10.0.4.10"
  user: "ubuntu"

targets:
  - host: "10.0.2.11"
    port: 80
    service: http
  - host: "10.0.2.12"
    port: 22
    service: ssh

steps:
  - id: step1
    name: "Web browsing simulation"
    tool: python3
    command: >
      python3 /opt/archivirt/attack-scripts/normal_traffic.py
      10.0.2.11
      --duration 30
    description: "Simulate legitimate web browsing across multiple pages"
    expected_detections: {}
    timeout_sec: 45

  - id: step2
    name: "SSH legitimate login"
    tool: ssh
    command: >
      ssh -o ConnectTimeout=10
      ubuntu@10.0.2.12
      "uname -a; whoami; df -h; uptime; exit"
    description: "Legitimate SSH session with system commands"
    expected_detections: {}
    timeout_sec: 30

  - id: step3
    name: "SCP file transfer"
    tool: scp
    command: >
      dd if=/dev/urandom bs=1M count=10 of=/tmp/archivirt_test_file.bin &&
      scp /tmp/archivirt_test_file.bin ubuntu@10.0.2.12:/tmp/
    description: "Legitimate SCP file transfer (10 MB)"
    expected_detections: {}
    timeout_sec: 60

  - id: step4
    name: "HTTP file download"
    tool: curl
    command: >
      curl -s http://10.0.2.11/dvwa/dvwa/images/login_logo.png
      -o /tmp/archivirt_download.png
    description: "Legitimate file download via HTTP"
    expected_detections: {}
    timeout_sec: 15

  - id: step5
    name: "DNS-style hostname resolution (nslookup)"
    tool: nslookup
    command: >
      nslookup archivirt-target-01 10.0.5.10 || true
    description: "Normal DNS resolution"
    expected_detections: {}
    timeout_sec: 10

metrics:
  collect:
    - false_positive_count
    - false_positive_rate
    - cpu_usage_pct
    - ram_usage_mb
  log_sources:
    snort:    "/var/log/snort/alert_fast.txt"
    suricata: "/var/log/suricata/fast.log"

expected_results:
  false_positive_rate_max_pct:
    snort: 0.8
    suricata: 0.3
  note: >
    Article results: Snort FP=0.8%, Suricata FP=0.3% under normal traffic.
    Any alert triggered during this scenario is a false positive.
