---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT Test Scenario: Port Scan (Nmap)
# Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
# MITRE ATT&CK: TA0043 - Reconnaissance / T1046 - Network Service Discovery
# ─────────────────────────────────────────────────────────────

scenario:
  id: "SCN-001"
  name: "Port Scan (Nmap)"
  description: >
    Performs comprehensive TCP/UDP port scanning against target VMs
    using Nmap. Tests IDS/IPS ability to detect reconnaissance activity.
  mitre_attack:
    tactic: "TA0043 - Reconnaissance"
    technique: "T1046 - Network Service Discovery"
  runs: 10

attacker:
  host: "10.0.4.10"
  user: "ubuntu"

targets:
  - "10.0.2.11"
  - "10.0.2.12"
  - "10.0.2.13"
  subnet: "10.0.2.0/24"

steps:
  - id: step1
    name: "SYN Scan — all targets"
    tool: nmap
    command: "nmap -sS -T4 -p 1-65535 10.0.2.0/24"
    description: "TCP SYN stealth scan against entire target subnet"
    expected_detections:
      snort:   "ARCHIVIRT Nmap SYN Scan"
      suricata: "ARCHIVIRT Nmap SYN Scan"
    timeout_sec: 120

  - id: step2
    name: "NULL Scan"
    tool: nmap
    command: "nmap -sN -T3 10.0.2.11 10.0.2.12 10.0.2.13"
    description: "TCP NULL scan (no flags set) to evade basic firewalls"
    expected_detections:
      snort:    "ARCHIVIRT Nmap NULL Scan"
      suricata: "ARCHIVIRT Nmap NULL Scan"
    timeout_sec: 60

  - id: step3
    name: "XMAS Scan"
    tool: nmap
    command: "nmap -sX -T3 10.0.2.11 10.0.2.12 10.0.2.13"
    description: "XMAS scan with FIN, PSH, URG flags"
    expected_detections:
      snort:    "ARCHIVIRT Nmap XMAS Scan"
      suricata: "ARCHIVIRT Nmap XMAS Scan"
    timeout_sec: 60

  - id: step4
    name: "Service & Version Detection"
    tool: nmap
    command: "nmap -sV -sC -p 22,21,80,443,445 10.0.2.0/24"
    description: "Service version fingerprinting with default scripts"
    expected_detections: {}
    timeout_sec: 90

  - id: step5
    name: "UDP Scan"
    tool: nmap
    command: "nmap -sU --top-ports 100 10.0.2.11"
    description: "UDP port scan for common services"
    expected_detections:
      suricata: "ARCHIVIRT Nmap UDP Scan"
    timeout_sec: 120

metrics:
  collect:
    - alert_count
    - false_positive_rate
    - detection_latency_ms
    - cpu_usage_pct
    - ram_usage_mb
  log_sources:
    snort:    "/var/log/snort/alert_fast.txt"
    suricata: "/var/log/suricata/fast.log"

expected_results:
  detection_rate_min_pct: 95.0
  false_positive_rate_max_pct: 2.0
  latency_max_ms: 50
