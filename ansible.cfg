[defaults]
inventory          = ansible/inventory/hosts.ini
host_key_checking  = False
timeout            = 60
forks              = 5
stdout_callback    = yaml

[privilege_escalation]
become             = True
become_method      = sudo
become_ask_pass    = False

[ssh_connection]
ssh_args           = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
timeout            = 60
connect_timeout    = 60
