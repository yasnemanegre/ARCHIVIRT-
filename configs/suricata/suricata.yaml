# =============================================================================
# ARCHIVIRT — Suricata 6.0.4 configuration (workers mode + AF-PACKET)
# =============================================================================
# Author  : Yasnemanegre SAWADOGO (SPbGUPTD)
# License : MIT — https://github.com/yasnemanegre/ARCHIVIRT
# Version : 2.1.0 — 2026-05-18
#
# Capture : AF-PACKET on ens4 (traffic mirror interface)
# Runmode : workers (one thread per CPU core)
# Rules   : ET Open ruleset (suricata.rules, downloaded by install_monitor.sh
#           via suricata-update) + ARCHIVIRT event rules + local custom rules
# =============================================================================
%YAML 1.1
---

# --- Network and port variables (required by ET Open ruleset) ----------------
vars:
  address-groups:
    HOME_NET:       "[10.0.2.0/24,10.0.3.0/24,10.0.4.0/24,10.0.5.0/24]"
    EXTERNAL_NET:   "!$HOME_NET"
    HTTP_SERVERS:   "$HOME_NET"
    SMTP_SERVERS:   "$HOME_NET"
    SQL_SERVERS:    "$HOME_NET"
    DNS_SERVERS:    "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    AIM_SERVERS:    "$EXTERNAL_NET"
    DC_SERVERS:     "$HOME_NET"
    DNP3_SERVER:    "$HOME_NET"
    DNP3_CLIENT:    "$HOME_NET"
    MODBUS_CLIENT:  "$HOME_NET"
    MODBUS_SERVER:  "$HOME_NET"
    ENIP_CLIENT:    "$HOME_NET"
    ENIP_SERVER:    "$HOME_NET"
  port-groups:
    HTTP_PORTS:      "80"
    SHELLCODE_PORTS: "!80"
    ORACLE_PORTS:    1521
    SSH_PORTS:       22
    DNP3_PORTS:      20000
    MODBUS_PORTS:    502
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS:       21
    VXLAN_PORTS:     4789
    TEREDO_PORTS:    3544

# --- Runmode -----------------------------------------------------------------
runmode: single

# --- Default logging directory -----------------------------------------------
default-log-dir: /var/log/suricata

# --- AF-PACKET capture on traffic mirror interface ---------------------------
pcap:
  - interface: ens4
    promisc: yes
    snaplen: 65535

# --- Rule management ---------------------------------------------------------
# suricata.rules     : ET Open ruleset (49778 rules enabled / 65629 total)
#                      downloaded by suricata-update on host, served via local
#                      apt mirror (http://10.0.3.1:8080/rules/suricata.rules)
# *-events.rules     : Suricata built-in protocol/decoder event rules
# archivirt-local.rules : custom ARCHIVIRT detection rules
default-rule-path: /etc/suricata/rules

rule-files:
  - suricata.rules
  - tls-events.rules
  - stream-events.rules
  - decoder-events.rules
  - smtp-events.rules
  - http-events.rules
  - http2-events.rules
  - dns-events.rules
  - smb-events.rules
  - kerberos-events.rules
  - archivirt-local.rules

# --- Classification and reference configs ------------------------------------
classification-file: /etc/suricata/classification.config
reference-config-file: /etc/suricata/reference.config

# --- Outputs -----------------------------------------------------------------
outputs:
  - fast:
      enabled: yes
      filename: fast.log
      append: no

  - eve-log:
      enabled: yes
      filename: eve.json
      types:
        - alert
        - http
        - dns
        - tls
      xff:
        enabled: no

# --- Threading ---------------------------------------------------------------
threading:
  detect-thread-ratio: 0.5
