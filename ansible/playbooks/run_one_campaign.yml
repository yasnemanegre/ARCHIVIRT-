# Tâches d'une campagne individuelle

- name: "[C{{ campaign_id }}] Reset IDS logs"
  shell: |
    ssh -i /home/archivirt/.ssh/archivirt_key \
      -o StrictHostKeyChecking=no -o BatchMode=yes \
      ubuntu@10.0.3.10 \
      "sudo rm -rf /var/log/snort3/SCN-* /var/log/suricata/SCN-*; \
       sudo pkill -9 snort 2>/dev/null; \
       sudo pkill -9 suricata 2>/dev/null; echo CLEAN"
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Reset tmp files"
  shell: rm -f /tmp/snort3_SCN-*.* /tmp/suricata_SCN-*.*
  become: yes

- name: "[C{{ campaign_id }}] Apply traffic mirrors"
  shell: sudo bash /home/archivirt/ARCHIVIRT/scripts/archivirt_mirrors.sh
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Run all scenarios"
  shell: |
    cd /home/archivirt/ARCHIVIRT && \
    ansible-playbook ansible/playbooks/run_all_scenarios.yml \
      -i ansible/inventory/hosts.ini \
      --ssh-extra-args="-o StrictHostKeyChecking=no" 2>&1 || true
  register: campaign_output
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Fetch result.json files"
  shell: |
    for scn in SCN-001 SCN-002 SCN-003 SCN-004 SCN-005; do
      scp -i /home/archivirt/.ssh/archivirt_key -o StrictHostKeyChecking=no \
        ubuntu@10.0.3.10:/tmp/snort3_${scn}_result.json /tmp/ 2>/dev/null
      scp -i /home/archivirt/.ssh/archivirt_key -o StrictHostKeyChecking=no \
        ubuntu@10.0.3.10:/tmp/suricata_${scn}_result.json /tmp/ 2>/dev/null
      scp -i /home/archivirt/.ssh/archivirt_key -o StrictHostKeyChecking=no \
        ubuntu@10.0.4.10:/tmp/snort3_attack_start_times_${scn}.txt /tmp/ 2>/dev/null
      scp -i /home/archivirt/.ssh/archivirt_key -o StrictHostKeyChecking=no \
        ubuntu@10.0.4.10:/tmp/suricata_attack_start_times_${scn}.txt /tmp/ 2>/dev/null
      scp -i /home/archivirt/.ssh/archivirt_key -o StrictHostKeyChecking=no \
        ubuntu@10.0.3.10:/var/log/suricata/${scn}/eve.json \
        /tmp/suricata_${scn}_alerts.json 2>/dev/null
    done
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Build results"
  shell: cd /home/archivirt/ARCHIVIRT && python3 scripts/build_final_results.py 2>/dev/null
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Save results"
  shell: |
    cp /home/archivirt/ARCHIVIRT/results/archivirt_final_comparison.json \
       /home/archivirt/ARCHIVIRT/results/campaigns/campaign_{{ campaign_id }}_comparison.json
  ignore_errors: yes

- name: "[C{{ campaign_id }}] DR summary"
  shell: |
    cd /home/archivirt/ARCHIVIRT && \
    python3 scripts/generate_report.py 2>/dev/null | grep -E "100\.0|Detect%" | head -10
  register: summary
  ignore_errors: yes

- name: "[C{{ campaign_id }}] Campaign {{ campaign_id }}/10 done"
  debug:
    msg: "{{ summary.stdout_lines | default(['no output']) }}"
