---
# ARCHIVIRT - Suricata IDS Test Scenario Playbook (workers mode + config deploy)
# Author: Yasnemanegre SAWADOGO (SPbGUPTD)
# Usage: ansible-playbook suricata_scenario.yml -e "scenario=SCN-001"

- name: ARCHIVIRT - Setup mirrors on localhost
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run archivirt_mirrors.sh
      shell: bash /home/archivirt/ARCHIVIRT/scripts/archivirt_mirrors.sh 2>/dev/null
      register: mirrors
    - name: Show mirrors status
      debug:
        msg: "Mirrors: {{ mirrors.stdout_lines | default([]) | select('search', '✅') | list }}"

- name: ARCHIVIRT - Start Suricata on monitor
  hosts: monitor
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"
    suricata_script: /opt/archivirt/scripts/run_suricata.sh
  tasks:
    - name: Deploy run_suricata.sh
      copy:
        src: /home/archivirt/ARCHIVIRT/scripts/run_suricata.sh
        dest: /opt/archivirt/scripts/run_suricata.sh
        mode: 0755
    - name: Deploy suricata configuration
      copy:
        src: /home/archivirt/ARCHIVIRT/configs/suricata/suricata.yaml
        dest: /etc/suricata/suricata.yaml
    - name: Stop previous Suricata
      shell: "bash {{ suricata_script }} stop {{ scenario }}"
      ignore_errors: yes
    - name: Start Suricata
      shell: "bash {{ suricata_script }} start {{ scenario }}"

- name: ARCHIVIRT - Run attack scenario
  hosts: attacker
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"
  tasks:
    - name: SCN-001 Port Scan
      shell: |
        > /tmp/attack_start_times_SCN-001.txt
        for i in $(seq 1 10); do
          date -u +%s >> /tmp/attack_start_times_SCN-001.txt
          nmap -sS -Pn -p 1-1024 --min-rate 1000 -T4 10.0.2.11 10.0.2.12 10.0.2.13 -oN /dev/null 2>/dev/null
          sleep 3
        done
      when: scenario == "SCN-001"

    - name: SCN-002 SSH Brute-force
      shell: |
        > /tmp/attack_start_times_SCN-002.txt
        for i in $(seq 1 10); do
          date -u +%s >> /tmp/attack_start_times_SCN-002.txt
          nmap -sS -Pn -p 22 --min-rate 500 -T4 10.0.2.11 10.0.2.12 10.0.2.13 2>/dev/null
          sleep 3
        done
      when: scenario == "SCN-002"

    - name: SCN-003 SQL Injection
      block:
        - name: Get DVWA cookie
          shell: COOKIE=$(curl -s -c - 'http://10.0.2.11/dvwa/login.php' --data 'username=admin&password=password&Login=Login' | grep PHPSESSID | awk '{print $NF}'); echo $COOKIE
          register: dvwa_cookie
        - name: Run sqlmap with timestamps
          shell: |
            > /tmp/attack_start_times_SCN-003.txt
            for i in $(seq 1 10); do
              date -u +%s >> /tmp/attack_start_times_SCN-003.txt
              sqlmap -u "http://10.0.2.11/dvwa/vulnerabilities/sqli/?id=1&Submit=Submit" \
                --cookie="PHPSESSID={{ dvwa_cookie.stdout }};security=low" \
                --batch --level=1 --risk=1 --technique=B --output-dir=/tmp/sqlmap_$i 2>/dev/null
              sleep 5
            done
      when: scenario == "SCN-003"

    - name: SCN-004 DDoS Slowloris
      shell: |
        > /tmp/attack_start_times_SCN-004.txt
        for i in $(seq 1 10); do
          date -u +%s >> /tmp/attack_start_times_SCN-004.txt
          timeout 20 python3 /opt/archivirt/attack-scripts/slowloris.py 10.0.2.11 --port 80 --sockets 150 --duration 15 2>/dev/null
          sleep 5
        done
      when: scenario == "SCN-004"

    - name: SCN-005 Normal Traffic
      shell: |
        > /tmp/attack_start_times_SCN-005.txt
        for i in $(seq 1 10); do
          date -u +%s >> /tmp/attack_start_times_SCN-005.txt
          curl -s http://10.0.2.11/ > /dev/null
          curl -s http://10.0.2.12/ > /dev/null
          sleep 3
        done
      when: scenario == "SCN-005"

    - name: Fetch attack start times to localhost
      fetch:
        src: "/tmp/attack_start_times_{{ scenario }}.txt"
        dest: "/tmp/attack_start_times_{{ scenario }}.txt"
        flat: yes
      when: scenario is defined

- name: ARCHIVIRT - Stop Suricata and collect results
  hosts: monitor
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"
    suricata_script: /opt/archivirt/scripts/run_suricata.sh
  tasks:
    - name: Stop Suricata
      shell: "bash {{ suricata_script }} stop {{ scenario }}"
      ignore_errors: yes
    - name: Count alerts from fast.log
      shell: wc -l < /var/log/suricata/{{ scenario }}/fast.log
      register: alert_count
    - name: Save result to JSON
      copy:
        content: "{\"scenario\":\"{{ scenario }}\",\"ids\":\"Suricata 6.0.4\",\"alerts\":{{ alert_count.stdout | default(0) }},\"date\":\"{{ ansible_date_time.date }}\"}\n"
        dest: "/tmp/suricata_{{ scenario }}_result.json"
    - name: Fetch result to localhost
      fetch:
        src: "/tmp/suricata_{{ scenario }}_result.json"
        dest: "/tmp/suricata_{{ scenario }}_result.json"
        flat: yes
    - name: Fetch raw eve.json (alerts)
      fetch:
        src: "/var/log/suricata/{{ scenario }}/eve.json"
        dest: "/tmp/suricata_{{ scenario }}_alerts.json"
        flat: yes
      ignore_errors: yes
    - name: Show result
      debug:
        msg: "Suricata {{ scenario }}: {{ alert_count.stdout }} alerts"
