# =============================================================================
# ARCHIVIRT - Master Playbook: Full IDS Evaluation Campaign
# =============================================================================
# Author  : Yasnemanegre SAWADOGO (SPbSUT / SPbGUPTD)
# License : MIT — https://github.com/yasnemanegre/ARCHIVIRT
# Version : 2.1.0 — 2026-05-11
#
# Description:
#   Orchestrates the complete ARCHIVIRT evaluation pipeline:
#     1. Runs all 5 attack scenarios against Snort 3.12.2.0
#     2. Runs all 5 attack scenarios against Suricata 6.0.4
#     3. Computes detection metrics (DR, FPR, latency)
#     4. Runs DBSCAN/UEBA behavioural analysis
#     5. Generates the final comparison report
#     6. Cleans up all temporary artefacts
#
# Usage:
#   ansible-playbook ansible/playbooks/run_all_scenarios.yml \
#     -i ansible/inventory/hosts.ini \
#     --ssh-extra-args="-o StrictHostKeyChecking=no"
#
# IaC principles applied:
#   - Full idempotency: terraform destroy/apply between runs
#   - Prefixed start-time files per IDS engine (avoids cross-contamination)
#   - Single consolidated metrics script (build_final_results.py)
#   - Exhaustive cleanup of all temporary and legacy artefacts
# =============================================================================


# -----------------------------------------------------------------------------
# PRE-FLIGHT — Vérification et préparation de monitor-ids
# -----------------------------------------------------------------------------
- name: ARCHIVIRT - Pre-flight checks on monitor-ids
  hosts: archivirt-monitor-ids
  become: yes
  tasks:
    - name: Ensure /var/log/snort exists
      ansible.builtin.file:
        path: /var/log/snort
        state: directory
        mode: "0755"

    - name: Ensure /opt/archivirt/scripts exists
      ansible.builtin.file:
        path: /opt/archivirt/scripts
        state: directory
        mode: "0755"
        owner: ubuntu
        group: ubuntu

    - name: Bring up monitoring interface ens4
      ansible.builtin.shell: |
        ip link set {{ monitor_interface | default('ens4') }} up 2>/dev/null || true
      changed_when: false

    - name: Ensure route monitor→manager exists
      ansible.builtin.shell: |
        ip route add 10.0.5.0/24 via 10.0.3.1 2>/dev/null || true
      changed_when: false

    - name: Ensure Suricata runs in af-packet mode (IDS)
      ansible.builtin.lineinfile:
        path: /lib/systemd/system/suricata.service
        regexp: "^ExecStart="
        line: "ExecStart=/usr/bin/suricata -D --af-packet -c /etc/suricata/suricata.yaml --pidfile /run/suricata.pid"
      notify: reload systemd
      when: ids_mode | default('ids') == 'ids'

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

# -----------------------------------------------------------------------------
# SNORT 3.12.2.0 — Scenarios SCN-001 to SCN-005
# -----------------------------------------------------------------------------

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-001"      # Port Scan
    ids_prefix: "snort3"

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-002"      # SSH Brute-force
    ids_prefix: "snort3"

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-003"      # SQL Injection (DVWA)
    ids_prefix: "snort3"

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-004"      # DDoS Slowloris
    ids_prefix: "snort3"

- import_playbook: snort_scenario.yml
  vars:
    scenario: "SCN-005"      # Normal traffic baseline (FPR reference)
    ids_prefix: "snort3"


# -----------------------------------------------------------------------------
# SURICATA 6.0.4 — Scenarios SCN-001 to SCN-005
# -----------------------------------------------------------------------------

- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-001"      # Port Scan
    ids_prefix: "suricata"

- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-002"      # SSH Brute-force
    ids_prefix: "suricata"

- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-003"      # SQL Injection (DVWA)
    ids_prefix: "suricata"

- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-004"      # DDoS Slowloris
    ids_prefix: "suricata"

- import_playbook: suricata_scenario.yml
  vars:
    scenario: "SCN-005"      # Normal traffic baseline (FPR reference)
    ids_prefix: "suricata"


# -----------------------------------------------------------------------------
# METRICS — Build detection efficiency metrics (DR, FPR, latency)
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Build final results (metrics + assembly)
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run build_final_results.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/build_final_results.py
      register: build_result
      failed_when: false

    - name: Show build output
      debug:
        msg: "{{ build_result.stdout_lines }}"


# -----------------------------------------------------------------------------
# UEBA — DBSCAN behavioural anomaly analysis
# -----------------------------------------------------------------------------


- name: ARCHIVIRT - Fetch all logs to localhost (IaC fallback)
  hosts: monitor
  gather_facts: no
  tasks:
    - name: Fetch Snort fast.log for each scenario
      fetch:
        src: "/var/log/snort3/{{ item }}/alert_fast.txt"
        dest: "/tmp/snort3_{{ item }}_fast.log"
        flat: yes
      loop: [SCN-001, SCN-002, SCN-003, SCN-004, SCN-005]
      ignore_errors: yes

    - name: Fetch Suricata eve.json for each scenario
      fetch:
        src: "/var/log/suricata/{{ item }}/eve.json"
        dest: "/tmp/suricata_{{ item }}_alerts.json"
        flat: yes
      loop: [SCN-001, SCN-002, SCN-003, SCN-004, SCN-005]
      ignore_errors: yes
- name: ARCHIVIRT - Run DBSCAN/UEBA analysis
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Execute dbscan_from_fetched.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/dbscan_from_fetched.py
      register: dbscan_result
      failed_when: false

    - name: Show DBSCAN result
      debug:
        msg: "{{ dbscan_result.stdout_lines }}"


# -----------------------------------------------------------------------------
# REPORT — Generate final comparison report (Tables 2, 3, 4)
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Generate final report
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: Run generate_report.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/generate_report.py
      register: report
      failed_when: false

    - name: Show report summary
      debug:
        msg: "{{ report.stdout_lines }}"


# -----------------------------------------------------------------------------
# CLEANUP — Remove all temporary and legacy artefacts
# -----------------------------------------------------------------------------

- name: ARCHIVIRT - Cleanup temporary files
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    scn_ids: ["001", "002", "003", "004", "005"]
    ids_prefixes: ["snort3", "suricata"]

  tasks:

    # -- Attack start-time files (prefixed format, current) ------------------
    - name: Remove prefixed attack start-time files
      file:
        path: "/tmp/{{ item[0] }}_attack_start_times_SCN-{{ item[1] }}.txt"
        state: absent
      loop: "{{ ids_prefixes | product(scn_ids) | list }}"

    # -- Attack start-time files (legacy unprefixed format) ------------------
    - name: Remove legacy unprefixed attack start-time files
      file:
        path: "/tmp/attack_start_times_SCN-{{ item }}.txt"
        state: absent
      loop: "{{ scn_ids }}"

    # -- Raw alert files (Snort JSON / Suricata eve.json) --------------------
    - name: Remove raw alert files
      file:
        path: "/tmp/{{ item[0] }}_SCN-{{ item[1] }}_alerts.json"
        state: absent
      loop: "{{ ids_prefixes | product(scn_ids) | list }}"

    # -- Intermediate per-scenario result snippets ---------------------------
    - name: Remove intermediate result snippets
      file:
        path: "/tmp/{{ item[0] }}_SCN-{{ item[1] }}_result.json"
        state: absent
      loop: "{{ ids_prefixes | product(scn_ids) | list }}"

    # -- Obsolete scripts superseded by build_final_results.py ---------------
    - name: Remove obsolete pipeline scripts
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /home/archivirt/ARCHIVIRT/scripts/calculate_detection_metrics.py
        - /home/archivirt/ARCHIVIRT/scripts/assemble_final_results.py
      ignore_errors: yes

    # -- Backup and cache files ----------------------------------------------
    - name: Remove backup, cache and stale files
      shell: >
        find /home/archivirt/ARCHIVIRT
        \( -name "*.bak*" -o -name "*_old.*" -o -name "*.pyc" -o -type d -name "__pycache__" \)
        | xargs rm -rf
      args:
        warn: false
