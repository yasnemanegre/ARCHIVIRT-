---
- name: ARCHIVIRT - Start Snort 3
  hosts: monitor
  become: yes
  tasks:
    - name: Stop any running Snort
      shell: pkill -f snort || true
      ignore_errors: yes

    - name: Clear alert logs
      shell: |
        truncate -s 0 /var/log/snort3/alert_fast.txt
        truncate -s 0 /var/log/snort3/alert_json.txt

    - name: Set ens4 promiscuous
      shell: ip link set ens4 up && ip link set ens4 promisc on

    - name: Start Snort 3 background
      shell: |
        nohup /usr/local/bin/snort \
          -c /etc/snort3/snort.lua \
          -i ens4 -l /var/log/snort3 \
          --daq-dir /usr/local/lib/daq/ \
          > /var/log/snort3/snort_stdout.log 2>&1 &
        echo $! > /var/run/snort3.pid
        sleep 8
        pgrep snort && echo "Snort3 OK"

- name: ARCHIVIRT - Run Attack SCN-001
  hosts: attacker
  become: yes
  tasks:
    - name: Port Scan 10 runs
      shell: |
        for i in $(seq 1 10); do
          nmap -sS -Pn -p 1-1024 --min-rate 1000 -T4 \
            10.0.2.11 10.0.2.12 10.0.2.13 -oN /dev/null 2>/dev/null
          sleep 3
        done
        echo "SCN-001 DONE"

- name: ARCHIVIRT - Stop Snort and collect results
  hosts: monitor
  become: yes
  tasks:
    - name: Stop Snort
      shell: |
        kill -SIGINT $(cat /var/run/snort3.pid 2>/dev/null) 2>/dev/null || pkill -f snort || true
        sleep 5

    - name: Count alerts
      shell: |
        python3 -c "
import json
rules={'1:9000001:1':'ICMP Test','1:9000002:1':'TCP SYN Scan',
       '1:9000003:1':'SSH Brute-force','1:9000004:1':'HTTP Connection',
       '1:9000005:1':'Slowloris DDoS'}
counts={}
with open('/var/log/snort3/alert_json.txt') as f:
  for line in f:
    try:
      d=json.loads(line)
      r=rules.get(d.get('rule','?'),'OTHER')
      counts[r]=counts.get(r,0)+1
    except: pass
for k,v in sorted(counts.items()): print(f'{k}: {v}')
print('TOTAL:', sum(counts.values()))
"
      register: results

    - name: Show results
      debug:
        msg: "{{ results.stdout }}"
