# ARCHIVIRT - 10 Campaigns Statistical Validation (σ < 2%)
# Author: Яснеманегре САВАДОГО (Аспирант СПбГУПТД)
# Version: 1.2.0 — 2026-05-12
# Strategy: log reset between campaigns (no terraform destroy/apply)

- name: ARCHIVIRT - 10 Campaigns Statistical Validation
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:

    - name: Create results directory
      file:
        path: "{{ playbook_dir }}/../../results/campaigns"
        state: directory
        mode: '0755'

    - name: Run 10 campaigns sequentially
      include_tasks: run_one_campaign.yml
      loop: "{{ range(1, 11) | list }}"
      loop_control:
        loop_var: campaign_id
        label: "Campaign {{ campaign_id }}/10"

    - name: Compute sigma across 10 campaigns
      shell: |
        python3 scripts/compute_sigma.py \
          results/campaigns/ \
          results/sigma_analysis.json
      args:
        chdir: "{{ playbook_dir }}/../../"
      register: sigma_result

    - name: Final sigma report
      debug:
        msg: "{{ sigma_result.stdout_lines }}"
