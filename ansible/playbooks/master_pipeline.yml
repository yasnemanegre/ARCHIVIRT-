---
# ARCHIVIRT - Master IaC Pipeline (all scenarios + report)
# Author: Yasnemanegre SAWADOGO (SPbGUPTD)
# Usage: ansible-playbook master_pipeline.yml

- name: ARCHIVIRT - Snort3 all scenarios
  include_tasks: run_scenario.yml
  vars:
    scenario: "{{ item }}"
  loop:
    - SCN-001
    - SCN-002
    - SCN-003
    - SCN-004
    - SCN-005

- name: ARCHIVIRT - Suricata all scenarios
  include_tasks: suricata_scenario.yml
  vars:
    scenario: "{{ item }}"
  loop:
    - SCN-001
    - SCN-002
    - SCN-003
    - SCN-004
    - SCN-005

- name: ARCHIVIRT - Generate final comparison report
  hosts: localhost
  tasks:
    - name: Run generate_report.py
      shell: python3 /home/archivirt/ARCHIVIRT/scripts/generate_report.py
      register: report

    - name: Show report summary
      debug:
        msg: "{{ report.stdout_lines }}"
