# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — IDS Snort 3 Role
# Deploys Snort 3 in passive IDS mode on the monitor VM
# ─────────────────────────────────────────────────────────────

- name: Install Snort 3 build dependencies
  ansible.builtin.apt:
    name:
      - build-essential
      - libpcap-dev
      - libpcre3-dev
      - libdumbnet-dev
      - bison
      - flex
      - zlib1g-dev
      - openssl
      - libssl-dev
      - libnghttp2-dev
      - pkg-config
      - cmake
      - libhwloc-dev
    state: present
  ignore_errors: yes

- name: Install Snort 3 via apt (Ubuntu 22.04 package)
  ansible.builtin.apt:
    name: snort
    state: present
  ignore_errors: true

- name: Create Snort directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/snort3
    - /etc/snort3/rules
    - /var/log/snort
    - /var/log/snort/pcaps

- name: Deploy Snort 3 main configuration
  ansible.builtin.copy:
    dest: /etc/snort3/snort.lua
    content: |
      ---------------------------------------------------------------------------
      -- ARCHIVIRT Snort 3 Configuration (IaC v3)
      -- Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
      -- Variables injectées via Ansible (hosts.ini)
      ---------------------------------------------------------------------------

      HOME_NET = '{{ target_subnet }}'
      EXTERNAL_NET = '{{ attack_subnet }}'
      include '/usr/local/etc/snort/snort_defaults.lua'
      DNS_SERVERS = HOME_NET
      HTTP_SERVERS = HOME_NET

      network = { checksum_eval = 'none' }

      detect =
      {
        pkts_per_batch = 64,
        max_pdu_size = 65535,
      }

      alert_fast =
      {
        file = true,
        packet = false,
        limit = 10,
      }

      ips =
      {
        enable_builtin_rules = true,
        include = '/etc/snort3/rules/archivirt.rules',
      }

- name: Deploy ARCHIVIRT local Snort 3 rules
  ansible.builtin.copy:
    dest: /etc/snort3/rules/archivirt.rules
    content: |
      # ─────────────────────────────────────────────────────────
      # ARCHIVIRT Local Snort 3 Rules (v3 — Snort 3.1.74 compatible)
      # ─────────────────────────────────────────────────────────

      # Port Scan Detection (Nmap)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap SYN Scan"; flags:S; sid:1000001; rev:3;)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap NULL Scan"; flags:0; sid:1000002; rev:3;)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap XMAS Scan"; flags:FPU; sid:1000003; rev:3;)

      # SSH Brute-force Detection
      alert tcp any any -> $HOME_NET 22 (msg:"ARCHIVIRT SSH Brute-force Attempt"; flow:to_server,established; content:"SSH"; sid:1000010; rev:3;)
      alert tcp any any -> $HOME_NET 22 (msg:"ARCHIVIRT SSH Multiple Auth"; flow:to_server,established; sid:1000011; rev:3;)

      # SQL Injection Detection
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT SQLi dvwa path"; content:"/dvwa/vulnerabilities/sqli/"; sid:1000020; rev:3;)
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT SQLi quote encoded"; content:"%27"; sid:1000021; rev:3;)
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT SQLi AND encoded"; content:"%20AND%20"; sid:1000022; rev:3;)
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT SQLi SELECT encoded"; content:"%20SELECT%20"; sid:1000023; rev:3;)
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT SQLi UNION encoded"; content:"%20UNION%20"; sid:1000024; rev:3;)

      # DDoS Slowloris Detection
      alert tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT Slowloris DDoS"; flow:to_server,established; content:"GET"; sid:1000030; rev:3;)

      # FTP Brute-force
      alert tcp any any -> $HOME_NET 21 (msg:"ARCHIVIRT FTP Brute-force"; flow:to_server,established; content:"PASS"; sid:1000040; rev:3;)

      # SMB Enumeration
      alert tcp any any -> $HOME_NET 445 (msg:"ARCHIVIRT SMB Scan Detected"; flow:to_server,established; sid:1000050; rev:3;)

- name: Create Snort pcap directory
  ansible.builtin.file:
    path: /var/log/snort/pcaps
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Set monitoring interface to promiscuous mode
  ansible.builtin.shell: |
    ip link set {{ monitor_interface | default('ens4') }} promisc on
  changed_when: true

- name: Create Snort systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/snort3.service
    content: |
      [Unit]
      Description=Snort 3 NIDS - ARCHIVIRT Lab
      After=network.target

      [Service]
      Type=simple
      ExecStart={{ snort_binary }} \
        -c /etc/snort3/snort.lua \
        -i {{ monitor_interface | default('ens4') }} \
        -l /var/log/snort \
        -D \
        --daq pcap \
        --daq-mode passive
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd and enable Snort 3
  ansible.builtin.systemd:
    daemon_reload: true
    name: snort3
    enabled: true
    state: started
  ignore_errors: yes

- name: Wait for Snort 3 to start
  pause:
    seconds: 15

- name: Verify Snort 3 is running
  ansible.builtin.command: systemctl is-active snort3
  register: snort_status
  changed_when: false
  ignore_errors: yes

- name: Print Snort status
  ansible.builtin.debug:
    msg: "Snort 3 status: {{ snort_status.stdout }}"
