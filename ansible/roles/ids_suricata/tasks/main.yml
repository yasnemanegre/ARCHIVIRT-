---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — IDS Suricata 6 Role
# Deploys Suricata 6 in passive IDS mode on the monitor VM
# Monitoring interface: ens4 (tap on target subnet 10.0.2.0/24)
# ─────────────────────────────────────────────────────────────

- name: Install Suricata from Ubuntu universe
  ansible.builtin.apt:
    name: suricata
    state: present
    update_cache: yes

- name: Create Suricata log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /var/log/suricata
    - /var/log/suricata/pcap
    - /etc/suricata/rules

- name: Deploy Suricata main configuration
  ansible.builtin.template:
    src: "{{ archivirt_project_dir }}/ansible/roles/ids_suricata/templates/suricata.yaml.j2"
    dest: /etc/suricata/suricata.yaml
    owner: root
    group: root
    mode: "0644"

- name: Deploy ARCHIVIRT local Suricata rules
  ansible.builtin.template:
    src: "{{ archivirt_project_dir }}/ansible/roles/ids_suricata/templates/archivirt-local.rules.j2"
    dest: /etc/suricata/rules/archivirt-local.rules
    owner: root
    group: root
    mode: "0644"
- name: Set monitoring interface to promiscuous mode
  ansible.builtin.shell: |
    ip link set {{ monitor_interface | default('ens4') }} promisc on
  changed_when: true

- name: Configure iptables NFQUEUE for IPS mode
  ansible.builtin.shell: |
    # Exclure SSH et trafic de gestion du NFQUEUE
    iptables -I INPUT -p tcp --dport 22 -j ACCEPT
    iptables -I OUTPUT -p tcp --sport 22 -j ACCEPT
    iptables -I FORWARD -p tcp --dport 22 -j ACCEPT
    # NFQUEUE pour le trafic cible uniquement
    iptables -A FORWARD -s {{ attack_subnet }} -d {{ target_subnet }} -j NFQUEUE --queue-num 0
    iptables -A FORWARD -s {{ target_subnet }} -d {{ attack_subnet }} -j NFQUEUE --queue-num 0
  when: ids_mode | default('ids') == 'ips'
  ignore_errors: yes

- name: Remove iptables NFQUEUE rules for IDS mode
  ansible.builtin.shell: |
    iptables -D FORWARD -i ens3 -o ens3 -j NFQUEUE --queue-num 0 2>/dev/null || true
    iptables -D INPUT -j NFQUEUE --queue-num 0 2>/dev/null || true
    iptables -D OUTPUT -j NFQUEUE --queue-num 0 2>/dev/null || true
  when: ids_mode | default('ids') == 'ids'
  ignore_errors: yes

- name: Configure Suricata to use correct interface
  ansible.builtin.replace:
    path: /etc/suricata/suricata.yaml
    regexp: "interface: default"
    replace: "interface: {{ monitor_interface | default('ens4') }}"

- name: Configure Suricata service command (IDS vs IPS)
  ansible.builtin.lineinfile:
    path: /lib/systemd/system/suricata.service
    regexp: "^ExecStart="
    line: "ExecStart=/usr/bin/suricata -D {% if ids_mode | default('ids') == 'ips' %}-q 0{% else %}--af-packet{% endif %} -c /etc/suricata/suricata.yaml --pidfile /run/suricata.pid"


- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable Suricata service
  ansible.builtin.systemd:
    name: suricata
    daemon_reload: true
    enabled: true
    state: restarted

- name: Verify Suricata is running
  ansible.builtin.command: systemctl is-active suricata
  register: suricata_status
  changed_when: false

- name: Print Suricata status
  ansible.builtin.debug:
    msg: "Suricata 6 status: {{ suricata_status.stdout }}"

- name: Deploy IPS Enforcer script
  ansible.builtin.copy:
    src: "{{ archivirt_project_dir }}/ansible/roles/ids_suricata/files/archivirt-ips-enforcer.py"
    dest: /opt/archivirt/archivirt-ips-enforcer.py
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  when: ids_mode | default('ids') == 'ips'

- name: Deploy IPS Enforcer systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/archivirt-ips.service
    content: |
      [Unit]
      Description=ARCHIVIRT IPS Enforcer
      After=suricata.service

      [Service]
      Type=simple
      User=root
      Environment=ARCHIVIRT_HOST_IP={{ archivirt_host_ip }}
      ExecStart=/usr/bin/python3 /opt/archivirt/archivirt-ips-enforcer.py
      Restart=on-failure
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  when: ids_mode | default('ids') == 'ips'

- name: Enable IPS Enforcer service
  ansible.builtin.systemd:
    name: archivirt-ips
    daemon_reload: true
    enabled: true
    state: started
  when: ids_mode | default('ids') == 'ips'
  ignore_errors: yes

- name: Disable IPS Enforcer service (IDS mode)
  ansible.builtin.systemd:
    name: archivirt-ips
    enabled: false
    state: stopped
  when: ids_mode | default('ids') == 'ids'
  ignore_errors: yes

- name: Install Telegraf on monitor-ids
  ansible.builtin.apt:
    name: telegraf
    state: present
  ignore_errors: yes

- name: Deploy Telegraf monitor-ids configuration
  ansible.builtin.copy:
    src: "{{ archivirt_project_dir }}/monitoring/telegraf-monitor.conf"
    dest: /etc/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf
    mode: "0644"

- name: Enable and start Telegraf on monitor-ids
  ansible.builtin.systemd:
    name: telegraf
    enabled: true
    state: restarted
  ignore_errors: yes
