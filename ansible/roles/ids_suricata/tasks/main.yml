---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — IDS Suricata 6 Role
# Deploys Suricata 6 in passive IDS mode on the monitor VM
# Monitoring interface: ens4 (tap on target subnet 10.0.2.0/24)
# ─────────────────────────────────────────────────────────────

- name: Install Suricata from Ubuntu universe
  ansible.builtin.apt:
    name: suricata
    state: present
    update_cache: yes

- name: Create Suricata log directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /var/log/suricata
    - /var/log/suricata/pcap
    - /etc/suricata/rules

- name: Deploy Suricata main configuration
  ansible.builtin.copy:
    dest: /etc/suricata/suricata.yaml
    content: |
      %YAML 1.1
      ---
      # ─────────────────────────────────────────────────────────
      # ARCHIVIRT Suricata 6 Configuration
      # Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
      # ─────────────────────────────────────────────────────────

      vars:
        address-groups:
          HOME_NET: "[10.0.2.0/24]"
          EXTERNAL_NET: "[10.0.4.0/24]"
          HTTP_SERVERS: "$HOME_NET"
          SQL_SERVERS: "$HOME_NET"
          DNS_SERVERS: "$HOME_NET"
          FTP_SERVERS: "$HOME_NET"
          SSH_SERVERS: "$HOME_NET"
          SMTP_SERVERS: "$HOME_NET"
          SIP_SERVERS: "$HOME_NET"

        port-groups:
          HTTP_PORTS: "80"
          SHELLCODE_PORTS: "!80"
          ORACLE_PORTS: 1521
          SSH_PORTS: 22
          FTP_PORTS: 21
          SMB_PORTS: "[139, 445]"

      default-log-dir: /var/log/suricata

      # Outputs
      outputs:
        - fast:
            enabled: yes
            filename: fast.log
            append: yes

        - eve-log:
            enabled: yes
            filetype: regular
            filename: eve.json
            types:
              - alert:
                  payload: yes
                  payload-buffer-size: 4kb
                  http: yes
                  tls: yes
                  ssh: yes
                  smtp: yes
                  dnp3: yes
                  metadata: yes
                  tagged-packets: yes
              - http:
                  extended: yes
              - dns:
                  version: 2
              - tls:
                  extended: yes
              - ssh
              - stats:
                  totals: yes
                  threads: no
                  deltas: no

        - pcap-log:
            enabled: yes
            filename: archivirt-capture-%n.pcap
            limit: 100mb
            max-files: 10
            mode: normal
            dir: /var/log/suricata/pcap

        - stats:
            enabled: yes
            filename: stats.log
            totals: yes
            threads: no

      # Application layer parsers
      app-layer:
        protocols:
          http:
            enabled: yes
            libhtp:
              default-config:
                personality: IDS
                request-body-limit: 100kb
          ftp:
            enabled: yes
          ssh:
            enabled: yes
          smtp:
            enabled: yes
          tls:
            enabled: yes
          dns:
            enabled: yes
          http2:
            enabled: yes

      # Multithreading (Suricata 6 advantage over Snort)
      threading:
        set-cpu-affinity: no
        cpu-affinity:
          - management-cpu-set:
              cpu: [ 0 ]
          - receive-cpu-set:
              cpu: [ 0 ]
          - worker-cpu-set:
              cpu: [ "all" ]
              mode: "balanced"
        detect-thread-ratio: 1.5

      # Detection engine
      detect:
        profile: medium
        custom-values:
          toclient-groups: 3
          toserver-groups: 25
        sgh-mpm-context: auto
        inspection-recursion-limit: 3000
        prefilter:
          default: mpm

      # Rules
      default-rule-path: /etc/suricata/rules

      rule-files:
        - tls-events.rules
        - stream-events.rules
        - decoder-events.rules
        - smtp-events.rules
        - http-events.rules
        - http2-events.rules
        - dns-events.rules
        - smb-events.rules
        - kerberos-events.rules
        - archivirt-local.rules

      # Host table
      host-mode: auto
      max-pending-packets: 1024
      runmode: autofp

      # Capture — IDS (af-packet) ou IPS (nfqueue)
{% if ids_mode | default('ids') == 'ips' %}
      nfqueue:
        mode: repeat
        repeat-mark: 1
        repeat-mask: 1
        route-queue: 2
        batchcount: 20
{% else %}
      af-packet:
        - interface: default
          threads: auto
          cluster-id: 99
          cluster-type: cluster_flow
          defrag: yes
          use-mmap: yes
          tpacket-v3: yes
          ring-size: 2048
          block-size: 32768
          block-timeout: 10
          use-emergency-flush: yes

      pcap:
        - interface: default
          buffer-size: 16mb
          bpf-filter: "not host {{ archivirt_host_ip }}"
          checksum-checks: auto
{% endif %}

      legacy:
        uricontent: enabled

- name: Deploy ARCHIVIRT local Suricata rules
  ansible.builtin.copy:
    dest: /etc/suricata/rules/archivirt-local.rules
    content: |
      # ─────────────────────────────────────────────────────────
      # ARCHIVIRT Local Suricata 6 Rules
      # ─────────────────────────────────────────────────────────

      # Port Scan Detection (Nmap)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap SYN Scan"; flags:S,12; threshold:type threshold, track by_src, count 20, seconds 2; classtype:network-scan; sid:2000001; rev:2;)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap NULL Scan"; flags:0; sid:2000002; rev:2;)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap FIN Scan"; flags:F; sid:2000003; rev:2;)
      alert tcp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap XMAS Scan"; flags:FPU; sid:2000004; rev:2;)
      alert udp any any -> $HOME_NET any (msg:"ARCHIVIRT Nmap UDP Scan"; threshold:type threshold, track by_src, count 50, seconds 5; sid:2000005; rev:2;)

      # SSH Brute-force Detection (Hydra)
      alert tcp any any -> $SSH_SERVERS $SSH_PORTS (msg:"ARCHIVIRT SSH Brute-force"; flow:to_server,established; content:"SSH"; threshold:type both, track by_src, count 5, seconds 30; classtype:attempted-user; sid:2000010; rev:2;)
      alert tcp any any -> $SSH_SERVERS $SSH_PORTS (msg:"ARCHIVIRT SSH Multiple Auth Failures"; threshold:type both, track by_src, count 10, seconds 60; classtype:attempted-user; sid:2000011; rev:2;)

      # SQL Injection Detection (sqlmap)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP SQL Injection UNION"; flow:to_server,established; http.method; content:"GET"; http.uri; content:"UNION"; nocase; content:"SELECT"; nocase; distance:0; within:20; classtype:web-application-attack; sid:2000020; rev:2;)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP SQLi Boolean Based"; flow:to_server,established; http.uri; content:"OR%201%3D1"; nocase; classtype:web-application-attack; sid:2000021; rev:3;)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP SQLi Boolean Unencoded"; flow:to_server,established; http.uri; content:"OR 1=1"; nocase; classtype:web-application-attack; sid:2000025; rev:1;)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP SQLi Time Based SLEEP"; flow:to_server,established; http.uri; content:"SLEEP%28"; nocase; classtype:web-application-attack; sid:2000022; rev:3;)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP SQLi Time Unencoded"; flow:to_server,established; http.uri; content:"SLEEP("; nocase; classtype:web-application-attack; sid:2000026; rev:1;)
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT HTTP sqlmap User-Agent"; flow:to_server,established; http.user_agent; content:"sqlmap"; classtype:web-application-attack; sid:2000023; rev:2;)

      # Slowloris DDoS Detection
      alert http any any -> $HTTP_SERVERS $HTTP_PORTS (msg:"ARCHIVIRT Slowloris DDoS Connection"; flow:to_server,established; threshold:type both, track by_dst, count 200, seconds 30; classtype:denial-of-service; sid:2000030; rev:2;)

      # FTP Brute-force
      alert tcp any any -> $FTP_SERVERS $FTP_PORTS (msg:"ARCHIVIRT FTP Auth Brute-force"; flow:to_server,established; content:"PASS"; threshold:type threshold, track by_src, count 5, seconds 30; classtype:attempted-user; sid:2000040; rev:2;)

      # ── IPS DROP rules (actives si ids_mode=ips) ──
{% if ids_mode | default('ids') == 'ips' %}
      drop tcp any any -> $HOME_NET any (msg:"ARCHIVIRT IPS DROP Nmap SYN"; flags:S,12; threshold:type threshold, track by_src, count 50, seconds 2; sid:3000001; rev:1;)
      drop tcp any any -> $HOME_NET 22 (msg:"ARCHIVIRT IPS DROP SSH Brute"; flow:to_server,established; content:"SSH"; threshold:type both, track by_src, count 10, seconds 30; sid:3000010; rev:1;)
      drop tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT IPS DROP SQLi UNION"; content:"UNION%20SELECT"; sid:3000020; rev:1;)
      drop tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT IPS DROP sqlmap"; content:"sqlmap"; sid:3000021; rev:1;)
      drop tcp any any -> $HOME_NET 80 (msg:"ARCHIVIRT IPS DROP Slowloris"; flow:to_server,established; content:"GET"; threshold:type both, track by_dst, count 200, seconds 30; sid:3000030; rev:1;)
{% endif %}
      # SMB Scan/Exploitation
      alert smb any any -> $HOME_NET $SMB_PORTS (msg:"ARCHIVIRT SMB Scan Detected"; threshold:type threshold, track by_src, count 5, seconds 10; classtype:network-scan; sid:2000050; rev:2;)


- name: Set monitoring interface to promiscuous mode
  ansible.builtin.shell: |
    ip link set {{ monitor_interface | default('ens4') }} promisc on
  changed_when: true

- name: Configure iptables NFQUEUE for IPS mode
  ansible.builtin.shell: |
    iptables -I FORWARD -i ens3 -o ens3 -j NFQUEUE --queue-num 0
    iptables -I INPUT -j NFQUEUE --queue-num 0
    iptables -I OUTPUT -j NFQUEUE --queue-num 0
  when: ids_mode | default('ids') == 'ips'
  ignore_errors: yes

- name: Remove iptables NFQUEUE rules for IDS mode
  ansible.builtin.shell: |
    iptables -D FORWARD -i ens3 -o ens3 -j NFQUEUE --queue-num 0 2>/dev/null || true
    iptables -D INPUT -j NFQUEUE --queue-num 0 2>/dev/null || true
    iptables -D OUTPUT -j NFQUEUE --queue-num 0 2>/dev/null || true
  when: ids_mode | default('ids') == 'ids'
  ignore_errors: yes

- name: Configure Suricata to use correct interface
  ansible.builtin.replace:
    path: /etc/suricata/suricata.yaml
    regexp: "interface: default"
    replace: "interface: {{ monitor_interface | default('ens4') }}"

- name: Enable Suricata service
  ansible.builtin.systemd:
    name: suricata
    daemon_reload: true
    enabled: true
    state: restarted

- name: Verify Suricata is running
  ansible.builtin.command: systemctl is-active suricata
  register: suricata_status
  changed_when: false

- name: Print Suricata status
  ansible.builtin.debug:
    msg: "Suricata 6 status: {{ suricata_status.stdout }}"

- name: Install Telegraf on monitor-ids
  ansible.builtin.apt:
    name: telegraf
    state: present
  ignore_errors: yes

- name: Deploy Telegraf monitor-ids configuration
  ansible.builtin.copy:
    src: "{{ archivirt_project_dir }}/monitoring/telegraf-monitor.conf"
    dest: /etc/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf
    mode: "0644"

- name: Enable and start Telegraf on monitor-ids
  ansible.builtin.systemd:
    name: telegraf
    enabled: true
    state: restarted
  ignore_errors: yes
