---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — Manager Role
# Installs: Python analysis stack, InfluxDB, Telegraf, Grafana
# ─────────────────────────────────────────────────────────────

- name: Install Python analysis packages
  ansible.builtin.pip:
    name:
      - pandas
      - matplotlib
      - seaborn
      - jinja2
      - paramiko
      - PyYAML
      - requests
      - rich
      - tabulate
      - numpy
      - scikit-learn
    executable: pip3

- name: Add InfluxDB apt repository (local mirror)
  ansible.builtin.shell: echo "Using local mirror"
  changed_when: false

- name: Install InfluxDB 2 and Telegraf
  ansible.builtin.apt:
    name:
      - influxdb2
      - telegraf
    state: present

- name: Install Grafana via local mirror
  ansible.builtin.apt:
    name: grafana
    state: present
  ignore_errors: yes

- name: Deploy Telegraf configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../monitoring/telegraf.conf"
    dest: /etc/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf

- name: Create ARCHIVIRT reports directory on manager
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  loop:
    - /opt/archivirt/reports
    - /opt/archivirt/logs
    - /opt/archivirt/scenarios

- name: Enable and start monitoring services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - influxdb
    - telegraf
    - grafana-server


- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:3000/api/health"
    method: GET
    status_code: 200
  register: grafana_health
  retries: 10
  delay: 5
  until: grafana_health.status == 200

- name: Configure Grafana datasource InfluxDB
  ansible.builtin.uri:
    url: "http://localhost:3000/api/datasources"
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      name: "InfluxDB-ARCHIVIRT"
      type: "influxdb"
      url: "http://10.0.5.10:8086"
      access: "proxy"
      jsonData:
        version: "Flux"
        organization: "archivirt"
        defaultBucket: "archivirt-metrics"
      secureJsonData:
        token: "archivirt-telegraf-token"
    status_code: [200, 409]
  ignore_errors: yes

- name: Import Grafana dashboard
  ansible.builtin.uri:
    url: "http://localhost:3000/api/dashboards/import"
    method: POST
    user: admin
    password: admin
    force_basic_auth: yes
    body_format: json
    body:
      dashboard: "{{ lookup('file', archivirt_project_dir + '/monitoring/grafana/dashboard.json') | from_json }}"
      overwrite: true
      folderId: 0
    status_code: [200, 412]
  ignore_errors: yes

- name: Print manager VM ready message
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════
      Manager VM configured:
        InfluxDB  : http://10.0.5.10:8086
        Grafana   : http://10.0.5.10:3000
        Telegraf  : collecting metrics
        Reports   : /opt/archivirt/reports/
      ════════════════════════════════════════════
