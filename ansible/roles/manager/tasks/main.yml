---
# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — Manager Role
# Installs: Python analysis stack, InfluxDB, Telegraf, Grafana
# ─────────────────────────────────────────────────────────────

- name: Install Python analysis packages
  ansible.builtin.pip:
    name:
      - pandas
      - matplotlib
      - seaborn
      - jinja2
      - paramiko
      - PyYAML
      - requests
      - rich
      - tabulate
      - numpy
    executable: pip3

- name: Add InfluxDB apt repository
  ansible.builtin.shell: |
    curl -s https://repos.influxdata.com/influxdata-archive.key | gpg --dearmor > /etc/apt/trusted.gpg.d/influxdata-archive.gpg
    echo "deb https://repos.influxdata.com/ubuntu stable main" > /etc/apt/sources.list.d/influxdata.list
    apt update
  changed_when: true

- name: Install InfluxDB 2 and Telegraf
  ansible.builtin.apt:
    name:
      - influxdb2
      - telegraf
    state: present

- name: Add Grafana apt repository
  ansible.builtin.shell: |
    curl -s https://packages.grafana.com/gpg.key | apt-key add -
    echo "deb https://packages.grafana.com/oss/deb stable main" > /etc/apt/sources.list.d/grafana.list
    apt update
  changed_when: true

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present

- name: Deploy Telegraf configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../monitoring/telegraf.conf"
    dest: /etc/telegraf/telegraf.conf
    owner: telegraf
    group: telegraf

- name: Create ARCHIVIRT reports directory on manager
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  loop:
    - /opt/archivirt/reports
    - /opt/archivirt/logs
    - /opt/archivirt/scenarios

- name: Enable and start monitoring services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - influxdb
    - telegraf
    - grafana-server

- name: Print manager VM ready message
  ansible.builtin.debug:
    msg: |
      ════════════════════════════════════════════
      Manager VM configured:
        InfluxDB  : http://10.0.5.10:8086
        Grafana   : http://10.0.5.10:3000
        Telegraf  : collecting metrics
        Reports   : /opt/archivirt/reports/
      ════════════════════════════════════════════
