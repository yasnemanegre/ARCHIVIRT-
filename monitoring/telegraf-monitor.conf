# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — Telegraf Configuration for monitor-ids VM
# Collects IDS metrics (Snort3 + Suricata) → InfluxDB on manager
# ─────────────────────────────────────────────────────────────
[agent]
  interval = "10s"
  round_interval = true
  hostname = "archivirt-monitor-ids"

# ── Output: InfluxDB 2.x on manager ──────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://10.0.5.10:8086"]
  token = "archivirt-telegraf-token"
  organization = "archivirt"
  bucket = "archivirt-metrics"

# ── CPU/RAM/Net ───────────────────────────────────────────────
[[inputs.cpu]]
  percpu = false
  totalcpu = true
  collect_cpu_time = false

[[inputs.mem]]

[[inputs.net]]
  interfaces = ["ens3", "ens4"]

# ── Snort3 process ────────────────────────────────────────────
[[inputs.procstat]]
  pattern = "snort"
  tag_with = ["pid"]

# ── Suricata process ──────────────────────────────────────────
[[inputs.procstat]]
  pattern = "suricata"
  tag_with = ["pid"]

# ── Snort alert counter ───────────────────────────────────────
[[inputs.exec]]
  commands = ["bash -c \"cat /var/log/snort3/*/alert_fast.txt 2>/dev/null | wc -l || echo 0\""]
  name_override = "archivirt_snort_alerts"
  timeout = "5s"
  data_format = "value"
  data_type = "integer"

# ── Suricata alert counter ────────────────────────────────────
[[inputs.exec]]
  commands = ["bash -c \"cat /var/log/suricata/fast.log 2>/dev/null | wc -l || echo 0\""]
  name_override = "archivirt_suricata_alerts"
  timeout = "5s"
  data_format = "value"
  data_type = "integer"

# ── Suricata eve.json stats ───────────────────────────────────
[[inputs.tail]]
  files = ["/var/log/suricata/eve.json"]
  from_beginning = false
  name_override = "suricata_eve"
  data_format = "json"
  tag_keys = ["event_type"]
  json_string_fields = ["src_ip", "dest_ip", "alert.signature"]
