# ─────────────────────────────────────────────────────────────
# ARCHIVIRT — Telegraf Configuration
# Author: Яснеманегре САВАДОГО (Аспирант СПБГУПТД)
# Collects system metrics from all ARCHIVIRT VMs
# ─────────────────────────────────────────────────────────────

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

# ── Output: InfluxDB 2.x ──────────────────────────────────────
[[outputs.influxdb_v2]]
  urls = ["http://10.0.5.10:8086"]
  token = "archivirt-telegraf-token"
  organization = "archivirt"
  bucket = "archivirt-metrics"

# ── CPU Usage ─────────────────────────────────────────────────
[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

# ── Memory Usage ──────────────────────────────────────────────
[[inputs.mem]]

# ── Disk Usage ────────────────────────────────────────────────
[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

# ── Network Interface Counters ────────────────────────────────
[[inputs.net]]
  interfaces = ["eth0", "eth1"]

# ── System Load ───────────────────────────────────────────────
[[inputs.system]]

# ── Process Monitor — IDS/IPS ─────────────────────────────────
[[inputs.procstat]]
  pattern = "(snort|suricata)"
  pid_tag = true

# ── Snort Alert Counter ───────────────────────────────────────
[[inputs.exec]]
  commands = ["bash -c \"wc -l < /var/log/snort/alert_fast.txt 2>/dev/null || echo 0\""]
  name_override = "archivirt_snort_alerts"
  timeout = "5s"
  data_format = "value"
  data_type = "integer"

# ── Suricata Alert Counter ────────────────────────────────────
[[inputs.exec]]
  commands = ["bash -c \"wc -l < /var/log/suricata/fast.log 2>/dev/null || echo 0\""]
  name_override = "archivirt_suricata_alerts"
  timeout = "5s"
  data_format = "value"
  data_type = "integer"

# ── Suricata Stats (from eve.json) ────────────────────────────
[[inputs.tail]]
  files = ["/var/log/suricata/eve.json"]
  from_beginning = false
  name_override = "suricata_eve"
  data_format = "json"
  tag_keys = ["event_type"]
  json_string_fields = ["src_ip", "dest_ip", "alert.signature"]
